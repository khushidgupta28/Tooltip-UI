<HTML>
<HEAD>
<meta charset='UTF-8'>
<meta name='viewpoint' component='width=device-width,initial-scale=1.0'>
<TITLE> Tooltip UI </TITLE>
<STYLE>
.nav{
display:flex;
gap:30px;
padding:20px;
margin-top:60px;
background-color:#f8fafc;
}
.nav a{
text-decoration:none;
color:#333;
font-family:sans-serif;
font-weight:bold;
font-size:18px;
}
.tooltip-container{
position:relative;
display:inline-block;
cursor:pointer;
text-decoration:none;
color:#333;
font-weight:500;
}
.tooltip-container::after{
content:"Here is Everything I have Built";
position:absolute;
bottom:140%;
left:50%;
transform:translateX(-50%) translateY(10px);
background-color:#1e293b;
color:#ffffff;
padding:8px 16px;
border-radius:8px;
font-size:14px;
white-space:nowrap;
opacity:0;
pointer-events:none;
transition:opacity 0.2s ease;
visibility: visible;
}
.tooltip-container::before{
content:"";
position:absolute;
bottom:100%;
left:50%;
transform:translateX(-50%);
border-width:6px;
border-style:solid;
border-color:#1e293b transparent transparent transparent;
opacity:0;
pointer-events:none;
transition:opacity 0.2s ease-in-out;
}
.tooltip-container:hover::after,.tooltip-container:hover::before{
opacity:1 !important;
}
.tooltip-container:hover::after{
transform:translateX(-50%) translateY(0);
}
</STYLE>
</HEAD>
<BODY>
<DIV class='nav'>
<a href='#'><H2>HOME</H2></a>
<a href='#' class='tooltip-container' ><H2>PROJECTS</H2></a>
<a href='#'><H2>BLOG</H2></a>
</DIV>
</BODY>
</HTML>
